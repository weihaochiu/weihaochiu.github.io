name: Update Google Scholar Metrics

on:
  workflow_dispatch:

  schedule:
    # Every Monday at 04:00 UTC = Monday 12:00 Taiwan time
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Update Scholar metrics
        run: |
          python scripts/update_scholar.py

      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/scholar_metrics.json data/publications.json

          if git diff --cached --quiet; then
            echo "No Scholar metric changes to commit."
          else
            git commit -m "Update Google Scholar metrics"
            git push
          fi
