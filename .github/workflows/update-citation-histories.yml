name: Update citation histories

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 06:17 in Taiwan (Sunday 22:17 UTC).
    - cron: "17 22 * * 0"

permissions:
  contents: write

concurrency:
  group: update-citation-histories
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        run: python -m pip install --upgrade requests

      - name: Update Google Scholar annual citation history
        id: google_scholar
        continue-on-error: true
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: python scripts/update_google_scholar_citation_history.py

      - name: Update OpenAlex annual citation history
        id: openalex
        continue-on-error: true
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python scripts/update_openalex_citation_history.py

      - name: Commit updated citation histories
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/google_scholar_citation_history.json 2>/dev/null || true
          git add data/openalex_citation_history.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No citation-history changes to commit."
          else
            git commit -m "Update annual citation histories"
            git push
          fi

      - name: Report updater failure
        if: steps.google_scholar.outcome == 'failure' || steps.openalex.outcome == 'failure'
        run: |
          echo "Google Scholar outcome: ${{ steps.google_scholar.outcome }}"
          echo "OpenAlex outcome: ${{ steps.openalex.outcome }}"
          exit 1
