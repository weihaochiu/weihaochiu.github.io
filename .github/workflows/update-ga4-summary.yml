name: Update GA4 summary

on:
  workflow_dispatch:
  schedule:
    - cron: "20 1 * * *" # 09:20 Asia/Taipei

permissions:
  contents: write

concurrency:
  group: ga4-summary
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-ga4.txt

      - name: Create temporary Google credentials
        shell: bash
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$GA4_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GA4_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/ga4-credentials.json"
          chmod 600 "$RUNNER_TEMP/ga4-credentials.json"

      - name: Generate aggregate GA4 JSON
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/ga4-credentials.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_OUTPUT_PATH: assets/data/ga-summary.json
        run: python scripts/export_ga4_summary.py

      - name: Commit JSON when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/ga-summary.json
          if git diff --cached --quiet; then
            echo "No analytics changes."
          else
            git commit -m "Update aggregate GA4 dashboard data"
            git push
          fi
