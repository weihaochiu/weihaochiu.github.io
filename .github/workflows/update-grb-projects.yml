name: Update GRB projects

on:
  workflow_dispatch:
  schedule:
    # 06:30 Asia/Taipei on the 22nd of every month.
    - cron: "30 22 21 * *"
  push:
    branches: [main]
    paths:
      - "scripts/update_grb_projects.py"
      - "scripts/update_grb_projects_browser.py"
      - "data/projects.json"
      - "data/grb_project_sources.json"
      - ".github/workflows/update-grb-projects.yml"

permissions:
  contents: write

concurrency:
  group: website-content-write
  cancel-in-progress: false

jobs:
  update:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install parser and browser dependencies
        run: |
          python -m pip install --disable-pip-version-check requests beautifulsoup4 playwright
          python -m playwright install --with-deps chromium
      - name: Test GRB parser
        run: python scripts/update_grb_projects.py --self-test
      - name: Update GRB projects and funding UI
        run: python scripts/update_grb_projects.py --patch-ui --allow-network-failure
      - name: Capture direct GRB HTTP diagnostics
        continue-on-error: true
        run: |
          mkdir -p grb_debug
          curl -sS -L --connect-timeout 15 --max-time 45 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36" \
            -D grb_debug/curl-18623445-headers.txt \
            -o grb_debug/curl-18623445.html \
            "https://www.grb.gov.tw/search/planDetail?id=18623445"
          curl -sS -L --connect-timeout 15 --max-time 45 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36" \
            -D grb_debug/curl-19484167-headers.txt \
            -o grb_debug/curl-19484167.html \
            "https://www.grb.gov.tw/search/planDetail?id=19484167"
      - name: Render JavaScript-driven GRB data
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/update_grb_projects_browser.py
      - name: Upload GRB diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grb-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            grb_debug/
            data/grb_projects_snapshot.json
          if-no-files-found: warn
          retention-days: 14
      - name: Validate generated data
        run: |
          python scripts/update_grb_projects.py --validate-only
          python -m json.tool data/projects.json >/dev/null
          python -m json.tool data/grb_project_sources.json >/dev/null
          python -m json.tool data/grb_projects_snapshot.json >/dev/null
          python -m json.tool data/grb_projects_pending.json >/dev/null
          git diff --check
      - name: Commit GRB updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            assets/js/app.js \
            data/projects.json \
            data/grb_project_sources.json \
            data/site_meta.json \
            data/grb_projects_snapshot.json \
            data/grb_projects_pending.json
          if git diff --cached --quiet; then
            echo "No GRB changes."
          else
            git commit -m "Update GRB project metadata"
            git push
          fi
