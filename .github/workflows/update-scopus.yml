name: Update Scopus Citation Counts

on:
  workflow_dispatch:

  schedule:
    # Every Monday at 05:00 UTC = Monday 13:00 Taiwan time
    - cron: "0 5 * * 1"

  push:
    branches: [main]
    paths:
      - "scripts/update_scopus.py"
      - ".github/workflows/update-scopus.yml"

permissions:
  contents: write

jobs:
  update-scopus:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update Scopus citation counts
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          SCOPUS_INST_TOKEN: ${{ secrets.SCOPUS_INST_TOKEN }}
        run: python scripts/update_scopus.py

      - name: Commit updated Scopus data and integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/scopus_citations.json assets/js/app.js publications.html

          if git diff --cached --quiet; then
            echo "No Scopus citation changes to commit."
          else
            git commit -m "Update Scopus citation counts"
            git push
          fi
