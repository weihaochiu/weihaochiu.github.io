name: Update OpenAlex metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-openalex-stats.yml"
      - "scripts/update_openalex_stats.py"
      - "scripts/update_openalex_publications.py"
      - "data/publications.json"

permissions:
  contents: write
  actions: write

concurrency:
  group: update-openalex-metrics
  cancel-in-progress: false

jobs:
  update-openalex-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch OpenAlex author metrics
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: python scripts/update_openalex_stats.py

      - name: Fetch per-publication OpenAlex metrics
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: python scripts/update_openalex_publications.py

      - name: Commit updated metrics when changed
        id: commit-metrics
        run: |
          FILES=(
            data/openalex_metrics.json
            data/openalex_publication_metrics.json
          )
          if [ -z "$(git status --porcelain -- "${FILES[@]}")" ]; then
            echo "OpenAlex metrics have not changed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "Update OpenAlex author and publication metrics"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Rebuild publication HTML after metrics update
        if: steps.commit-metrics.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-seo.yml --ref main
