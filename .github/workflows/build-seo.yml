name: Build v23 AI and scholarly metadata

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/publications.json"
      - "data/crossref_publication_metrics.json"
      - "scripts/build_seo.py"
      - ".github/workflows/build-seo.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate v23 website files
        run: python scripts/build_seo.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Build v23 AI and scholarly metadata"
            git push
          fi
